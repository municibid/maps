<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Municibid Platform Growth (2006-2026)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: 100vh; background: #1a1a2e; }
    
    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to top, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.8) 80%, transparent 100%);
      padding: 30px 40px 25px;
      color: white;
      display: flex;
      align-items: center;
      gap: 25px;
    }
    
    .title-section { flex-shrink: 0; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #94a3b8; }
    
    .date-display {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #FFC637);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
      min-width: 90px;
      text-align: center;
    }
    
    .stats { display: flex; gap: 20px; flex-shrink: 0; }
    .stat { display: flex; align-items: center; gap: 8px; }
    .stat-dot { width: 12px; height: 12px; border-radius: 50%; }
    .stat-dot.seller { background: #FFC637; }
    .stat-dot.bidder { background: #3b82f6; }
    .stat-label { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .timeline-section { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
    .timeline input { width: 100%; cursor: pointer; }
    
    .play-controls { display: flex; gap: 10px; flex-shrink: 0; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 14px; }
    button.play { background: #3b82f6; color: white; }
    button.play:hover { background: #2563eb; }
    button.reset { background: #374151; color: white; }
    button.reset:hover { background: #4b5563; }
    
    .speed-control { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .speed-control label { font-size: 12px; color: #94a3b8; }
    .speed-control select { background: #374151; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    
    input[type="range"] { -webkit-appearance: none; background: #374151; height: 6px; border-radius: 3px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: linear-gradient(135deg, #3b82f6, #FFC637); border-radius: 50%; cursor: pointer; }
    .leaflet-control-attribution { display: none; }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      .controls {
        padding: 15px 20px 20px;
        gap: 15px;
      }
      .title-section { display: none; }
      .date-display { font-size: 28px; min-width: 70px; }
      .stats { gap: 15px; }
      .stat-dot { width: 10px; height: 10px; }
      .stat-label { font-size: 11px; }
      .timeline-section { flex: 1; min-width: 120px; }
      .play-controls { display: none; }
      .speed-control { display: none; }
    }
    
    @media (max-width: 480px) {
      .controls { padding: 12px 15px 15px; gap: 12px; }
      .date-display { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div class="controls">
    <div class="title-section">
      <h1>Municibid Platform Growth</h1>
      <div class="subtitle">2006 – Present</div>
    </div>
    
    <div class="date-display" id="dateDisplay">2006</div>
    
    <div class="stats">
      <div class="stat sellers">
        <div class="stat-dot seller"></div>
        <div class="stat-label">Sellers</div>
      </div>
      <div class="stat bidders">
        <div class="stat-dot bidder"></div>
        <div class="stat-label">Bidders</div>
      </div>
    </div>
    
    <div class="timeline-section">
      <input type="range" id="monthSlider" min="0" max="242" value="0" step="1">
    </div>
    
    <div class="play-controls">
      <button class="play" id="playBtn">▶ Play</button>
      <button class="reset" id="resetBtn">↺ Reset</button>
    </div>
    
    <div class="speed-control">
      <label>Speed:</label>
      <select id="speedSelect">
        <option value="150">Slow</option>
        <option value="75" selected>Normal</option>
        <option value="35">Fast</option>
        <option value="15">Very Fast</option>
      </select>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Use Canvas renderer for much better performance with many markers
    const canvasRenderer = L.canvas({ padding: 0.5 });
    
    const map = L.map('map', {
      center: [39.8, -98.5],
      zoom: 4,
      zoomControl: true,
      attributionControl: false,
      preferCanvas: true
    });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(map);
    
    // Pre-organized data by month
    let featuresByMonth = {};
    let allMonths = [];
    let sellerLayer = L.layerGroup().addTo(map);
    let bidderLayer = L.layerGroup().addTo(map);
    let isPlaying = false;
    let playInterval = null;
    let currentMonthIndex = -1;
    let cumulativeSellers = 0;
    let cumulativeBidders = 0;
    
    // Generate months
    for (let year = 2006; year <= 2026; year++) {
      const maxMonth = (year === 2026) ? 3 : 12;
      for (let month = 1; month <= maxMonth; month++) {
        allMonths.push({
          yearMonth: `${year}-${String(month).padStart(2, '0')}`,
          year,
          month
        });
      }
    }
    document.getElementById('monthSlider').max = allMonths.length - 1;
    
    // Load and pre-process data
    fetch('platform-growth.json')
      .then(res => res.json())
      .then(data => {
        // Group features by yearMonth
        for (const feature of data.features) {
          const ym = feature.properties.yearMonth;
          if (!ym) continue;
          if (!featuresByMonth[ym]) featuresByMonth[ym] = [];
          featuresByMonth[ym].push(feature);
        }
        console.log(`Loaded ${data.features.length} features across ${Object.keys(featuresByMonth).length} months`);
        
        // Start
        goToMonth(0);
        setTimeout(() => document.getElementById('playBtn').click(), 500);
      });
    
    function addMarkersForMonth(monthYM) {
      const features = featuresByMonth[monthYM] || [];
      for (const feature of features) {
        const [lng, lat] = feature.geometry.coordinates;
        const isSeller = feature.properties.userType === 'seller';
        
        const marker = L.circleMarker([lat, lng], {
          renderer: canvasRenderer,
          radius: isSeller ? 5 : 2,
          fillColor: isSeller ? '#FFC637' : '#3b82f6',
          color: isSeller ? '#FFC637' : '#60a5fa',
          weight: isSeller ? 1 : 0,
          opacity: 0.9,
          fillOpacity: isSeller ? 0.8 : 0.6
        });
        
        if (isSeller) {
          sellerLayer.addLayer(marker);
          cumulativeSellers++;
        } else {
          bidderLayer.addLayer(marker);
          cumulativeBidders++;
        }
      }
    }
    
    function goToMonth(targetIndex) {
      if (targetIndex < currentMonthIndex) {
        // Going backwards - need to rebuild
        sellerLayer.clearLayers();
        bidderLayer.clearLayers();
        cumulativeSellers = 0;
        cumulativeBidders = 0;
        currentMonthIndex = -1;
      }
      
      // Add markers for all months from current+1 to target
      for (let i = currentMonthIndex + 1; i <= targetIndex; i++) {
        addMarkersForMonth(allMonths[i].yearMonth);
      }
      currentMonthIndex = targetIndex;
      
      // Update UI
      const targetMonth = allMonths[targetIndex];
      document.getElementById('dateDisplay').textContent = targetMonth.year;
      document.getElementById('monthSlider').value = targetIndex;
    }
    
    // Event listeners
    document.getElementById('monthSlider').addEventListener('input', (e) => {
      goToMonth(parseInt(e.target.value));
    });
    
    document.getElementById('playBtn').addEventListener('click', () => {
      if (isPlaying) {
        clearInterval(playInterval);
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶ Play';
      } else {
        isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸ Pause';
        
        let idx = currentMonthIndex;
        if (idx >= allMonths.length - 1) {
          goToMonth(0);
          idx = 0;
        }
        
        const speed = parseInt(document.getElementById('speedSelect').value);
        playInterval = setInterval(() => {
          idx++;
          if (idx >= allMonths.length) {
            // Loop back to beginning
            goToMonth(0);
            idx = 0;
          } else {
            goToMonth(idx);
          }
        }, speed);
      }
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (isPlaying) {
        clearInterval(playInterval);
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶ Play';
      }
      goToMonth(0);
    });
    
    document.getElementById('speedSelect').addEventListener('change', () => {
      if (isPlaying) {
        document.getElementById('playBtn').click();
        document.getElementById('playBtn').click();
      }
    });
  </script>
</body>
</html>
